name: Publish Mod

# Runs when a new tag is pushed (ie. via GitHub release or `git tag v1.2.3 && git push --tags`).
# The tag name is used as the package version, so tag with plain SemVer like: 1.0.2
#
# SECURITY: the Thunderstore token lives ONLY in the repo's encrypted Actions secrets
# (Settings -> Secrets and variables -> Actions -> THUNDERSTORE_TOKEN).
# NEVER write the token into this file or anywhere else in the repo.
on:
  push:
    tags:
      - '*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: GreenTF/upload-thunderstore-package@v4.3
        with:
          namespace: Revival # the Thunderstore 'team' to publish under
          name: RevivalSync
          description: '[HIGHLY EXPERIMENTAL - expect game-breaking bugs] Singleplayer-feel multiplayer for R.E.P.O. Made by Revival.'
          token: ${{ secrets.THUNDERSTORE_TOKEN }}
          version: ${{ github.ref_name }} # tag name = package version
          community: repo
          path: package # only the built files in package/ are shipped (README + icon come from repo root)
          deps: BepInEx-BepInExPack-5.4.2100
